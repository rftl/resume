name: Deploy to S3

on:
  push:
    branches: [master]

permissions:
  id-token: write  # required for OIDC token request
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          # Long cache for hashed assets (JS/CSS bundles — filenames change each build)
          aws s3 sync dist/resume/browser/ s3://resume.rtobo.org \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # No cache for index.html — always fetch latest
          aws s3 cp dist/resume/browser/index.html s3://resume.rtobo.org/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1TDT1W6RV2Z6F \
            --paths "/index.html"

          aws cloudfront create-invalidation \
            --distribution-id EWU0G4VUWM9Y1 \
            --paths "/index.html"