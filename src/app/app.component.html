<div [class.hidden]="!menuActive" class="side-nav" #sidebar id="sidebar">
  <fa-icon [class.active]="menuActive" [icon]="getMenuState()" class="menu-toggle"
           (click)="menuActive = !menuActive"></fa-icon>

  <div class="sidebar-profile">
    <img ngSrc="assets/img/face.png" alt="Raul Tobo" width="65" height="65"
         class="sidebar-avatar">
    <div class="sidebar-identity">
      <h4 class="sidebar-name">Raul Tobo</h4>
      <p class="sidebar-title">Software Engineer</p>
      <div class="sidebar-links">
        <a href="https://www.linkedin.com/in/rtobo/" target="_blank" aria-label="LinkedIn">
          <i class="bi bi-linkedin"></i>
        </a>
        <a href="https://github.com/rftl" target="_blank" aria-label="GitHub">
          <i class="bi bi-github"></i>
        </a>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a [routerLink]="['/home']" class="sidebar-link" routerLinkActive="sidebar-link--active">
      <fa-icon [icon]="faHome" class="sidebar-link-icon"></fa-icon>
      <span>Home</span>
    </a>
    <a [routerLink]="['/skills']" class="sidebar-link" routerLinkActive="sidebar-link--active">
      <fa-icon [icon]="faCode" class="sidebar-link-icon"></fa-icon>
      <span>Skills</span>
    </a>
    <a [routerLink]="['/employment']" class="sidebar-link" routerLinkActive="sidebar-link--active">
      <fa-icon [icon]="faEmp" class="sidebar-link-icon"></fa-icon>
      <span>Employment</span>
    </a>
    <a [routerLink]="['/resume']" class="sidebar-link" routerLinkActive="sidebar-link--active">
      <fa-icon [icon]="faFile" class="sidebar-link-icon"></fa-icon>
      <span>Resume</span>
    </a>
  </nav>

  <div class="theme-toggle-btn">
    <fa-icon [icon]="faSun" class="toggle-icon"></fa-icon>
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" role="switch"
             [checked]="themeService.isDark()" (change)="themeService.toggle()">
    </div>
    <fa-icon [icon]="faMoon" class="toggle-icon"></fa-icon>
  </div>
</div>
<div [class.active]="!menuActive" class="content" #content id="content">
  <div class="col-12 route-content">
    <router-outlet></router-outlet>
  </div>
</div>
