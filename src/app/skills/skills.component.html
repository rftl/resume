<h3>Skills</h3>

<div class="container-fluid">
  @for (skillGroup of skillSet; track skillGroup.category) {
    <div class="skill-group mb-4">
      <h6 class="skill-category-label">{{skillGroup.category}}</h6>
      <div class="skill-pills">
        @for (skill of skillGroup.skills; track $index) {
          <span class="skill-pill">{{skill}}</span>
        }
      </div>
    </div>
  }
</div>
