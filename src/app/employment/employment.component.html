<h3>Employment History</h3>

<div class="container-fluid">
  <div class="timeline">
    @for (employment of employmentData; track employment.code) {
      <div class="timeline-entry">
        <div class="timeline-dot"></div>
        <div class="timeline-card">
          <div class="timeline-header" (click)="toggleContent(employment.code)">
            <div class="timeline-header-main">
              <h5 class="company-name mb-0">{{employment.company}}</h5>
              <p class="job-title text-muted mb-0">{{employment.title}}</p>
            </div>
            <div class="timeline-meta d-flex align-items-center gap-2 flex-shrink-0">
              <span class="date-badge">{{employment.start}} – {{employment.end}}</span>
              <fa-icon [icon]="getArrowIcon(employment.code)" class="toggle-icon"></fa-icon>
            </div>
          </div>
          <div class="timeline-tasks" [hidden]="!isExpanded(employment.code)">
            <ul class="task-list mt-3">
              @for (task of employment.tasks; track $index) {
                <li class="task-item">
                  <fa-icon [icon]="bullet" class="bullet-icon text-muted"></fa-icon>
                  <span>{{task}}</span>
                </li>
              }
            </ul>
          </div>
        </div>
      </div>
    }
  </div>
</div>
